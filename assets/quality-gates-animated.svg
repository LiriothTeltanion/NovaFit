<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" role="img" aria-labelledby="title desc">
  <title id="title">NovaFit quality gate pipeline</title>
  <desc id="desc">An animated local verification pipeline from validation through tests, analytics exports, smoke checks, and release readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset=".56" stop-color="#0d2135"/><stop offset="1" stop-color="#20143e"/></linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".45" stop-color="#34d399"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#7dd3fc" stroke-opacity=".08"/></pattern>
    <style>
      .flow{stroke-dasharray:10 15;animation:flow 5s linear infinite}
      .pulse{animation:pulse 2.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .delay1{animation-delay:.35s}.delay2{animation-delay:.7s}.delay3{animation-delay:1.05s}.delay4{animation-delay:1.4s}
      @keyframes flow{to{stroke-dashoffset:-100}}
      @keyframes pulse{0%,100%{transform:translateY(0);opacity:.78}50%{transform:translateY(-6px);opacity:1}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="250" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="250" rx="28" fill="url(#grid)"/>
  <text x="52" y="47" fill="#f2fbff" font-family="Segoe UI,Arial" font-size="27" font-weight="800">One command · reproducible quality evidence</text>
  <text x="54" y="75" fill="#91a8bd" font-family="Segoe UI,Arial" font-size="14">python scripts/verify.py  →  compile  →  full suite  →  isolated SQLite smoke  →  PNG + HTML outputs</text>
  <path class="flow" d="M115 150H1085" fill="none" stroke="url(#signal)" stroke-width="4" filter="url(#glow)"/>
  <g font-family="Segoe UI,Arial" text-anchor="middle">
    <g class="pulse" transform="translate(128 117)"><rect width="158" height="70" x="-79" rx="18" fill="#102a43" stroke="#22d3ee" stroke-opacity=".65"/><text y="29" fill="#67e8f9" font-size="16" font-weight="800">VALIDATE</text><text y="50" fill="#9fb6c9" font-size="11">inputs · schema · deps</text></g>
    <g class="pulse delay1" transform="translate(363 117)"><rect width="158" height="70" x="-79" rx="18" fill="#102f34" stroke="#34d399" stroke-opacity=".65"/><text y="29" fill="#6ee7b7" font-size="16" font-weight="800">COMPILE</text><text y="50" fill="#9fb6c9" font-size="11">Python package</text></g>
    <g class="pulse delay2" transform="translate(598 117)"><rect width="158" height="70" x="-79" rx="18" fill="#1a2540" stroke="#60a5fa" stroke-opacity=".65"/><text y="29" fill="#93c5fd" font-size="16" font-weight="800">TEST</text><text y="50" fill="#9fb6c9" font-size="11">deterministic suite</text></g>
    <g class="pulse delay3" transform="translate(833 117)"><rect width="158" height="70" x="-79" rx="18" fill="#221b40" stroke="#8b5cf6" stroke-opacity=".7"/><text y="29" fill="#c4b5fd" font-size="16" font-weight="800">SMOKE</text><text y="50" fill="#9fb6c9" font-size="11">DB · JSON · PNG · HTML</text></g>
    <g class="pulse delay4" transform="translate(1068 117)"><rect width="158" height="70" x="-79" rx="18" fill="#35251a" stroke="#fbbf24" stroke-opacity=".72"/><text y="29" fill="#fde68a" font-size="16" font-weight="800">RELEASE</text><text y="50" fill="#9fb6c9" font-size="11">Windows + Ubuntu</text></g>
  </g>
  <text x="1148" y="226" text-anchor="end" fill="#6ee7f7" font-family="Segoe UI,Arial" font-size="12" font-weight="700">LOCAL QA · NO PRIVATE DATABASE REQUIRED</text>
  <rect x="1" y="1" width="1198" height="248" rx="27" fill="none" stroke="#7dd3fc" stroke-opacity=".18"/>
</svg>
