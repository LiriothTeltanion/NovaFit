<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">NovaFit Motivation Center</title>
  <desc id="desc">Animated constellation connecting purpose, small actions, milestones, achievements, and recovery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#061314"/><stop offset=".55" stop-color="#0a2223"/><stop offset="1" stop-color="#1b1234"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#2dd4bf" stop-opacity=".8"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="9"/></filter>
    <style>
      .orbit{fill:none;stroke:#2dd4bf;stroke-opacity:.28;stroke-width:2;stroke-dasharray:8 12;animation:dash 12s linear infinite}
      .orbit.alt{stroke:#c084fc;animation-direction:reverse;animation-duration:17s}
      .node{transform-box:fill-box;transform-origin:center;animation:pulse 3.6s ease-in-out infinite}
      .node:nth-of-type(2){animation-delay:.5s}.node:nth-of-type(3){animation-delay:1s}.node:nth-of-type(4){animation-delay:1.5s}
      .spark{animation:twinkle 2.2s ease-in-out infinite}.spark:nth-child(2n){animation-delay:.7s}.spark:nth-child(3n){animation-delay:1.3s}
      .beam{stroke-dasharray:420;stroke-dashoffset:420;animation:draw 5s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-400}}@keyframes pulse{50%{transform:scale(1.08);filter:drop-shadow(0 0 18px #2dd4bf)}}
      @keyframes twinkle{50%{opacity:.25;transform:scale(.55)}}@keyframes draw{45%,75%{stroke-dashoffset:0}100%{stroke-dashoffset:-420}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="940" cy="198" r="190" fill="url(#glow)" opacity=".32" filter="url(#blur)"/>
  <g font-family="Segoe UI,Arial,sans-serif">
    <text x="62" y="78" fill="#2dd4bf" font-size="18" font-weight="800" letter-spacing="4">NOVA / MOTIVATION CENTER</text>
    <text x="62" y="126" fill="#ecfffb" font-size="39" font-weight="800">Build the next repeatable win.</text>
    <text x="62" y="160" fill="#95c6bf" font-size="18">Purpose → action → evidence → celebration → recovery</text>
  </g>
  <path class="beam" d="M92 278 C260 210 370 345 535 270 S800 185 985 270" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <ellipse class="orbit" cx="944" cy="246" rx="172" ry="86"/><ellipse class="orbit alt" cx="944" cy="246" rx="116" ry="148"/>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle">
    <g class="node"><circle cx="160" cy="265" r="48" fill="#103334" stroke="#2dd4bf" stroke-width="3"/><text x="160" y="260" fill="#ecfffb" font-size="15" font-weight="700">PURPOSE</text><text x="160" y="282" fill="#95c6bf" font-size="12">why it matters</text></g>
    <g class="node"><circle cx="420" cy="300" r="48" fill="#103334" stroke="#c084fc" stroke-width="3"/><text x="420" y="296" fill="#ecfffb" font-size="15" font-weight="700">ACTION</text><text x="420" y="318" fill="#95c6bf" font-size="12">one useful step</text></g>
    <g class="node"><circle cx="680" cy="244" r="48" fill="#103334" stroke="#4ade80" stroke-width="3"/><text x="680" y="240" fill="#ecfffb" font-size="15" font-weight="700">EVIDENCE</text><text x="680" y="262" fill="#95c6bf" font-size="12">local records</text></g>
    <g class="node"><circle cx="944" cy="246" r="62" fill="#2a1740" stroke="#f0abfc" stroke-width="4"/><text x="944" y="239" fill="#ecfffb" font-size="17" font-weight="800">MOMENTUM</text><text x="944" y="264" fill="#f0abfc" font-size="13">transparent · non-medical</text></g>
  </g>
  <g fill="#ecfffb"><circle class="spark" cx="836" cy="112" r="3"/><circle class="spark" cx="1020" cy="98" r="4"/><circle class="spark" cx="1090" cy="210" r="3"/><circle class="spark" cx="806" cy="330" r="4"/><circle class="spark" cx="1060" cy="354" r="3"/></g>
  <text x="62" y="386" fill="#95c6bf" font-family="Segoe UI,Arial,sans-serif" font-size="14">Private purpose board · achievement constellation · weekly challenge · 60-second visual reset</text>
</svg>
