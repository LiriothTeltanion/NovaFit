<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
<title id="title">Three NovaFit analytics views</title><desc id="desc">Command Center, Trend Lab, and Consistency Map each answer a different question about local tracking data.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#1a1037"/></linearGradient><style>.title{font:800 27px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 16px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 11px system-ui,"Segoe UI",sans-serif;fill:#91a8bd}.card{fill:#0b1828;stroke:#28445f;stroke-width:1.5}.c1{animation:c 6s ease-in-out infinite}.c2{animation:c 6s ease-in-out 2s infinite}.c3{animation:c 6s ease-in-out 4s infinite}.line{stroke-dasharray:300;stroke-dashoffset:300;animation:l 4s ease-in-out infinite alternate}@keyframes c{0%,30%,100%{transform:translateY(0);filter:none}15%{transform:translateY(-8px);filter:drop-shadow(0 0 12px #22d3ee)}}@keyframes l{to{stroke-dashoffset:0}}@media(prefers-reduced-motion:reduce){.c1,.c2,.c3,.line{animation:none!important}.line{stroke-dashoffset:0}}</style></defs>
<rect width="1200" height="330" rx="26" fill="url(#bg)"/><text x="44" y="47" class="title">One dataset · three analytical lenses</text><text x="44" y="71" class="s">Switch instantly in the GUI or export each view from the CLI</text>
<g transform="translate(42 103)" class="c1"><rect width="345" height="180" rx="22" class="card"/><text x="24" y="35" class="h">01 · Command Center</text><text x="24" y="57" class="s">“What is happening now?”</text><polyline points="26,135 65,112 98,126 138,84 174,102 211,66 249,96 289,61 320,78" fill="none" stroke="#22d3ee" stroke-width="4" class="line"/><circle cx="299" cy="118" r="28" fill="none" stroke="#34d399" stroke-width="8" stroke-dasharray="126 176" transform="rotate(-90 299 118)"/></g>
<g transform="translate(427 103)" class="c2"><rect width="345" height="180" rx="22" class="card"/><text x="24" y="35" class="h">02 · Trend Lab</text><text x="24" y="57" class="s">“How are routines changing?”</text><g transform="translate(30 80)"><rect x="0" y="48" width="18" height="30" rx="3" fill="#38bdf8"/><rect x="28" y="32" width="18" height="46" rx="3" fill="#34d399"/><rect x="56" y="40" width="18" height="38" rx="3" fill="#22d3ee"/><rect x="84" y="20" width="18" height="58" rx="3" fill="#34d399"/><rect x="112" y="37" width="18" height="41" rx="3" fill="#38bdf8"/><path d="M0 48C42 42 75 33 112 23S200 33 280 8" fill="none" stroke="#a78bfa" stroke-width="4" class="line"/></g></g>
<g transform="translate(812 103)" class="c3"><rect width="345" height="180" rx="22" class="card"/><text x="24" y="35" class="h">03 · Consistency Map</text><text x="24" y="57" class="s">“Where are the stable patterns?”</text><g transform="translate(27 78)">
<g fill="#34d399"><rect width="28" height="18" rx="3"/><rect x="35" width="28" height="18" rx="3"/><rect x="70" width="28" height="18" rx="3"/><rect x="140" width="28" height="18" rx="3"/><rect x="210" width="28" height="18" rx="3"/><rect x="245" width="28" height="18" rx="3"/></g><g fill="#22d3ee"><rect y="25" width="28" height="18" rx="3"/><rect x="70" y="25" width="28" height="18" rx="3"/><rect x="105" y="25" width="28" height="18" rx="3"/><rect x="175" y="25" width="28" height="18" rx="3"/><rect x="245" y="25" width="28" height="18" rx="3"/><rect x="280" y="25" width="28" height="18" rx="3"/></g><g fill="#38bdf8"><rect x="35" y="50" width="28" height="18" rx="3"/><rect x="105" y="50" width="28" height="18" rx="3"/><rect x="140" y="50" width="28" height="18" rx="3"/><rect x="210" y="50" width="28" height="18" rx="3"/><rect x="280" y="50" width="28" height="18" rx="3"/></g></g></g>
</svg>
