<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
<title id="title">NovaFit Windows launch flow</title><desc id="desc">A safe one-time setup creates a virtual environment, installs dependencies, runs verification, and launches the GUI.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset="1" stop-color="#101a3b"/></linearGradient><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#22d3ee"/></marker><style>.title{font:800 27px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 14px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 11px system-ui,"Segoe UI",sans-serif;fill:#91a8bd}.box{fill:#0b1828;stroke:#28445f;stroke-width:1.5}.flow{stroke:#22d3ee;stroke-width:2.5;stroke-dasharray:8 8;marker-end:url(#arrow);animation:f 2.4s linear infinite}.ok{animation:p 2.4s ease-in-out infinite}.step{animation:s 4.8s ease-in-out infinite}.step:nth-of-type(2){animation-delay:.6s}.step:nth-of-type(3){animation-delay:1.2s}.step:nth-of-type(4){animation-delay:1.8s}@keyframes f{to{stroke-dashoffset:-32}}@keyframes p{50%{opacity:.5;filter:drop-shadow(0 0 9px #34d399)}}@keyframes s{50%{transform:translateY(-4px)}}@media(prefers-reduced-motion:reduce){.flow,.ok,.step{animation:none!important}}</style></defs>
<rect width="1200" height="300" rx="27" fill="url(#bg)"/><text x="44" y="48" class="title">Windows: one safe setup, then double-click to run</text><text x="44" y="73" class="s">Isolated virtual environment · no global package pollution · verification before launch</text>
<g transform="translate(45 112)" class="step"><rect width="230" height="120" rx="20" class="box"/><text x="115" y="37" text-anchor="middle" font-size="27">🪟</text><text x="115" y="68" text-anchor="middle" class="h">setup_windows.bat</text><text x="115" y="92" text-anchor="middle" class="s">check Python + create .venv</text></g>
<path d="M278 172H342" class="flow"/>
<g transform="translate(347 112)" class="step"><rect width="205" height="120" rx="20" class="box"/><text x="102" y="38" text-anchor="middle" font-size="26">📦</text><text x="102" y="68" text-anchor="middle" class="h">Install dependencies</text><text x="102" y="92" text-anchor="middle" class="s">requests · Faker · matplotlib</text></g>
<path d="M555 172H620" class="flow"/>
<g transform="translate(625 112)" class="step"><rect width="205" height="120" rx="20" class="box"/><text x="102" y="38" text-anchor="middle" font-size="26">🧪</text><text x="102" y="68" text-anchor="middle" class="h">Verify release</text><text x="102" y="92" text-anchor="middle" class="s">compile + tests + smoke exports</text></g>
<path d="M833 172H898" class="flow"/>
<g transform="translate(903 112)" class="step"><rect width="250" height="120" rx="20" fill="#0d2634" stroke="#34d399" stroke-width="2"/><text x="125" y="38" text-anchor="middle" font-size="26" class="ok">✅</text><text x="125" y="68" text-anchor="middle" class="h">run_novafit.bat</text><text x="125" y="92" text-anchor="middle" class="s">launch the desktop command center</text></g>
</svg>
