<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
<title id="title">NovaFit local-first privacy architecture</title><desc id="desc">Data flows from the user into validation, SQLite, analytics, and optional local exports. Weather receives city coordinates only.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset="1" stop-color="#160c30"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#22d3ee"/></marker><style>.t{font:800 25px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 13px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 11px system-ui,"Segoe UI",sans-serif;fill:#91a8bd}.box{fill:#0b1828;stroke:#28445f;stroke-width:1.4}.flow{fill:none;stroke:#22d3ee;stroke-width:2.5;stroke-dasharray:9 8;marker-end:url(#a);animation:f 2.6s linear infinite}.lock{animation:p 2.7s ease-in-out infinite;transform-origin:center}.packet{animation:m 4s ease-in-out infinite}@keyframes f{to{stroke-dashoffset:-34}}@keyframes p{50%{filter:drop-shadow(0 0 12px #34d399);transform:scale(1.04)}}@keyframes m{0%,100%{opacity:.2}50%{opacity:1}}@media(prefers-reduced-motion:reduce){.flow,.lock,.packet{animation:none!important}}</style></defs>
<rect width="1200" height="300" rx="26" fill="url(#bg)"/><text x="44" y="46" class="t">Privacy is part of the product architecture</text><text x="44" y="70" class="s">No account · no cloud database · no hidden sync · explicit optional network boundary</text>
<g transform="translate(42 102)"><rect width="180" height="120" rx="18" class="box"/><text x="90" y="35" text-anchor="middle" class="h">YOU</text><text x="90" y="62" text-anchor="middle" font-size="30">🏃‍♂️</text><text x="90" y="91" text-anchor="middle" class="s">daily record</text></g>
<path d="M225 162H310" class="flow"/>
<g transform="translate(315 102)"><rect width="190" height="120" rx="18" class="box"/><text x="95" y="35" text-anchor="middle" class="h">VALIDATION</text><text x="95" y="68" text-anchor="middle" font-size="25">✓</text><text x="95" y="94" text-anchor="middle" class="s">bounded, typed input</text></g>
<path d="M508 162H588" class="flow"/>
<g transform="translate(593 92)" class="lock"><rect width="200" height="140" rx="22" fill="#0d2634" stroke="#34d399" stroke-width="2"/><path d="M79 62v-12a21 21 0 0 1 42 0v12M70 62h60v45H70z" fill="none" stroke="#34d399" stroke-width="5"/><circle cx="100" cy="83" r="6" fill="#34d399"/><text x="100" y="125" text-anchor="middle" class="h">LOCAL SQLITE</text></g>
<path d="M797 162H874" class="flow"/>
<g transform="translate(879 102)"><rect width="145" height="120" rx="18" class="box"/><text x="72" y="35" text-anchor="middle" class="h">ANALYTICS</text><polyline points="24,87 47,67 70,78 94,48 120,59" fill="none" stroke="#22d3ee" stroke-width="4" filter="url(#g)"/><text x="72" y="105" text-anchor="middle" class="s">on-device</text></g>
<path d="M1027 162H1090" class="flow"/>
<g transform="translate(1094 116)"><rect width="80" height="92" rx="16" class="box"/><text x="40" y="34" text-anchor="middle" font-size="25">📦</text><text x="40" y="61" text-anchor="middle" class="h">EXPORT</text><text x="40" y="78" text-anchor="middle" class="s">JSON/CSV</text></g>
<path d="M694 236C694 270 860 270 860 235" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="7 7" class="packet"/><text x="777" y="286" text-anchor="middle" class="s">Optional weather call sends city coordinates only — never health records</text>
</svg>
