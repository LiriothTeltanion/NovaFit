<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc"><title id="title">Self-healing Windows verification</title><desc id="desc">The checker creates a virtual environment, installs dependencies, validates timezone data, runs tests, and produces exports.</desc><defs><linearGradient id="bg" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#11243c"/></linearGradient><style>.dash{stroke-dasharray:10 10;animation:flow 5s linear infinite}.check{animation:pop 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.check:nth-child(2){animation-delay:.5s}.check:nth-child(3){animation-delay:1s}.check:nth-child(4){animation-delay:1.5s}.check:nth-child(5){animation-delay:2s}@keyframes flow{to{stroke-dashoffset:-160}}@keyframes pop{0%,18%{opacity:.35;transform:scale(.92)}35%,100%{opacity:1;transform:scale(1)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style></defs><rect width="1200" height="340" rx="28" fill="url(#bg)"/><text x="55" y="65" fill="#e6f4ff" font-family="Segoe UI,Arial" font-size="34" font-weight="800">Windows checker: repair first, verify second.</text><text x="55" y="96" fill="#91a8bd" font-family="Segoe UI,Arial" font-size="17">No more tests running through an unprepared global Python installation.</text><path class="dash" d="M120 215 H1080" stroke="#22d3ee" stroke-width="3" opacity=".45"/>
<g font-family="Segoe UI,Arial" text-anchor="middle"><g class="check"><circle cx="140" cy="215" r="48" fill="#13263a" stroke="#22d3ee" stroke-width="3"/><text x="140" y="210" fill="#e6f4ff" font-size="14" font-weight="700">DETECT</text><text x="140" y="230" fill="#91a8bd" font-size="11">Python 3.10–3.14</text></g><g class="check"><circle cx="370" cy="215" r="48" fill="#13263a" stroke="#8b5cf6" stroke-width="3"/><text x="370" y="210" fill="#e6f4ff" font-size="14" font-weight="700">REPAIR</text><text x="370" y="230" fill="#91a8bd" font-size="11">local .venv</text></g><g class="check"><circle cx="600" cy="215" r="48" fill="#13263a" stroke="#34d399" stroke-width="3"/><text x="600" y="210" fill="#e6f4ff" font-size="14" font-weight="700">INSTALL</text><text x="600" y="230" fill="#91a8bd" font-size="11">binary wheels</text></g><g class="check"><circle cx="830" cy="215" r="48" fill="#13263a" stroke="#fbbf24" stroke-width="3"/><text x="830" y="210" fill="#e6f4ff" font-size="14" font-weight="700">PREFLIGHT</text><text x="830" y="230" fill="#91a8bd" font-size="11">Matplotlib + tzdata</text></g><g class="check"><circle cx="1060" cy="215" r="48" fill="#13263a" stroke="#fb7185" stroke-width="3"/><text x="1060" y="210" fill="#e6f4ff" font-size="14" font-weight="700">VERIFY</text><text x="1060" y="230" fill="#91a8bd" font-size="11">74 tests + smoke</text></g></g></svg>
