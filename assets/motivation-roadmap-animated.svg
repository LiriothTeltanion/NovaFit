<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc"><title id="title">NovaFit motivation roadmap</title><desc id="desc">A path from the first record through rhythm, milestones, purpose, and sustainable recovery.</desc><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#180a14"/><stop offset="1" stop-color="#061314"/></linearGradient><style>.path{stroke-dasharray:16 12;animation:move 7s linear infinite}.star{animation:glow 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.star:nth-child(2){animation-delay:.6s}.star:nth-child(3){animation-delay:1.2s}.star:nth-child(4){animation-delay:1.8s}.star:nth-child(5){animation-delay:2.4s}@keyframes move{to{stroke-dashoffset:-220}}@keyframes glow{50%{transform:scale(1.12);filter:drop-shadow(0 0 12px #2dd4bf)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style></defs><rect width="1200" height="320" rx="28" fill="url(#bg)"/><text x="54" y="60" fill="#fff1f7" font-family="Segoe UI,Arial" font-size="32" font-weight="800">Motivation is a system, not a slogan.</text><text x="54" y="91" fill="#d5a4bf" font-family="Segoe UI,Arial" font-size="16">Small evidence → visible rhythm → meaningful milestone → deliberate recovery</text><path class="path" d="M90 220 C270 120 390 285 580 200 S890 130 1110 205" fill="none" stroke="#2dd4bf" stroke-width="4"/><g font-family="Segoe UI,Arial" text-anchor="middle"><g class="star"><circle cx="115" cy="208" r="34" fill="#2a1022" stroke="#f472b6" stroke-width="3"/><text x="115" y="214" fill="#fff1f7" font-size="12" font-weight="700">RECORD</text></g><g class="star"><circle cx="360" cy="205" r="34" fill="#0a2223" stroke="#2dd4bf" stroke-width="3"/><text x="360" y="211" fill="#ecfffb" font-size="12" font-weight="700">RHYTHM</text></g><g class="star"><circle cx="600" cy="190" r="34" fill="#2a1740" stroke="#c084fc" stroke-width="3"/><text x="600" y="196" fill="#fff" font-size="12" font-weight="700">BADGE</text></g><g class="star"><circle cx="840" cy="184" r="34" fill="#3a2117" stroke="#fb923c" stroke-width="3"/><text x="840" y="190" fill="#fff7ed" font-size="12" font-weight="700">PURPOSE</text></g><g class="star"><circle cx="1080" cy="205" r="34" fill="#163522" stroke="#4ade80" stroke-width="3"/><text x="1080" y="211" fill="#f0fdf4" font-size="12" font-weight="700">RECOVER</text></g></g></svg>
