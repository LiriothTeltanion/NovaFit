<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">NovaFit feature orbit</title>
  <desc id="desc">Health metrics and application capabilities orbit around a local SQLite data core.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#15113c"/></linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .orbit1 { transform-origin: 600px 215px; animation: spin 28s linear infinite; }
      .orbit2 { transform-origin: 600px 215px; animation: spinBack 38s linear infinite; }
      .counter1 { transform-box: fill-box; transform-origin: center; animation: spinBack 28s linear infinite; }
      .counter2 { transform-box: fill-box; transform-origin: center; animation: spin 38s linear infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinBack { to { transform: rotate(-360deg); } }
      @keyframes pulse { 0%,100% { opacity:.45 } 50% { opacity:1 } }
      @media (prefers-reduced-motion: reduce) { * { animation:none!important; } }
    </style>
  </defs>
  <rect width="1200" height="430" rx="28" fill="url(#background)"/>
  <ellipse cx="600" cy="215" rx="375" ry="140" fill="none" stroke="#22d3ee" stroke-opacity="0.26" stroke-width="2" stroke-dasharray="7 12"/>
  <ellipse cx="600" cy="215" rx="285" ry="185" fill="none" stroke="#8b5cf6" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="5 14"/>

  <g filter="url(#glow)">
    <circle cx="600" cy="215" r="92" fill="#0d2136" stroke="url(#ring)" stroke-width="4"/>
    <circle class="pulse" cx="600" cy="215" r="73" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2"/>
    <text x="600" y="202" text-anchor="middle" fill="#9fb6c9" font-family="Segoe UI,Arial" font-size="14" font-weight="700">LOCAL DATA CORE</text>
    <text x="600" y="232" text-anchor="middle" fill="#f0fbff" font-family="Segoe UI,Arial" font-size="25" font-weight="800">SQLite</text>
    <text x="600" y="257" text-anchor="middle" fill="#34d399" font-family="Segoe UI,Arial" font-size="13">private · portable · tested</text>
  </g>

  <g class="orbit1">
    <g class="counter1" transform="translate(225 180)"><rect width="150" height="70" rx="18" fill="#102a43" stroke="#22d3ee"/><text x="75" y="30" text-anchor="middle" fill="#8ea8bb" font-family="Segoe UI,Arial" font-size="12">INTERFACES</text><text x="75" y="52" text-anchor="middle" fill="#67e8f9" font-family="Segoe UI,Arial" font-size="17" font-weight="700">CLI + GUI</text></g>
    <g class="counter1" transform="translate(825 180)"><rect width="150" height="70" rx="18" fill="#102a43" stroke="#34d399"/><text x="75" y="30" text-anchor="middle" fill="#8ea8bb" font-family="Segoe UI,Arial" font-size="12">PORTABILITY</text><text x="75" y="52" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI,Arial" font-size="17" font-weight="700">JSON + CSV</text></g>
  </g>

  <g class="orbit2">
    <g class="counter2" transform="translate(510 17)"><rect width="180" height="66" rx="18" fill="#1a1636" stroke="#8b5cf6"/><text x="90" y="27" text-anchor="middle" fill="#aaa2d2" font-family="Segoe UI,Arial" font-size="12">INSIGHTS</text><text x="90" y="49" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI,Arial" font-size="16" font-weight="700">Goals · Trends · Charts</text></g>
    <g class="counter2" transform="translate(505 347)"><rect width="190" height="66" rx="18" fill="#12263a" stroke="#fbbf24"/><text x="95" y="27" text-anchor="middle" fill="#c3ae7d" font-family="Segoe UI,Arial" font-size="12">OPTIONAL NETWORK</text><text x="95" y="49" text-anchor="middle" fill="#fde68a" font-family="Segoe UI,Arial" font-size="16" font-weight="700">Open-Meteo weather</text></g>
  </g>

  <g font-family="Segoe UI,Arial" font-size="14" fill="#b7c9d7">
    <text x="55" y="75">✓ Schema migration</text><text x="55" y="103">✓ Validated imports</text><text x="55" y="131">✓ Atomic backups</text>
    <text x="985" y="75">✓ 22 automated tests</text><text x="985" y="103">✓ Windows launchers</text><text x="985" y="131">✓ CI on two OSes</text>
  </g>
</svg>
