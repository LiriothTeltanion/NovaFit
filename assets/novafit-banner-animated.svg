<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">NovaFit animated health tracker banner</title>
  <desc id="desc">A dark futuristic health dashboard banner with a moving pulse line, orbiting metric nodes, and NovaFit title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.5" stop-color="#0b1f34"/>
      <stop offset="1" stop-color="#17113c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#5f8aa6" stroke-opacity="0.12"/>
    </pattern>
    <style>
      .float-a { animation: floatA 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .float-b { animation: floatB 6.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .dash { stroke-dasharray: 10 18; animation: dash 7s linear infinite; }
      .blink { animation: blink 2.2s ease-in-out infinite; }
      @keyframes floatA { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-11px) } }
      @keyframes floatB { 0%,100% { transform: translateY(0) rotate(0deg) } 50% { transform: translateY(9px) rotate(3deg) } }
      @keyframes dash { to { stroke-dashoffset: -112 } }
      @keyframes blink { 0%,100% { opacity: .35 } 50% { opacity: 1 } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="30" fill="url(#grid)"/>
  <circle cx="180" cy="40" r="170" fill="url(#glow)" opacity="0.22"/>
  <circle cx="1070" cy="300" r="230" fill="url(#glow)" opacity="0.16"/>

  <g opacity="0.65">
    <path class="dash" d="M40 250 C220 170 320 295 480 225 S760 120 930 205 S1090 260 1160 175" fill="none" stroke="url(#pulse)" stroke-width="2"/>
    <path d="M40 250 C220 170 320 295 480 225 S760 120 930 205 S1090 260 1160 175" fill="none" stroke="#d5fbff" stroke-opacity="0.1" stroke-width="8"/>
  </g>

  <g transform="translate(80 72)">
    <circle cx="68" cy="82" r="70" fill="#0d1b2a" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="68" cy="82" r="52" fill="none" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 8"/>
    <path d="M25 82h25l10-30 17 62 15-43 10 20h23" fill="none" stroke="url(#pulse)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
    <circle class="blink" cx="125" cy="91" r="6" fill="#34d399"/>
  </g>

  <g transform="translate(285 84)">
    <text x="0" y="64" fill="#f4fbff" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="800" letter-spacing="1">NovaFit</text>
    <text x="2" y="103" fill="#78dced" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="600">Local-first health tracking · Python · Tkinter · SQLite</text>
    <text x="2" y="140" fill="#9fb6c9" font-family="Segoe UI, Arial, sans-serif" font-size="16">CLI + GUI · JSON/CSV · Goals · Trends · Weather · Tests · Windows launchers</text>
  </g>

  <g class="float-a" transform="translate(890 58)">
    <rect width="116" height="76" rx="18" fill="#102a43" stroke="#34d399" stroke-opacity="0.65"/>
    <text x="18" y="28" fill="#8ea8bb" font-family="Segoe UI, Arial" font-size="12" font-weight="700">STEPS</text>
    <text x="18" y="58" fill="#34d399" font-family="Segoe UI, Arial" font-size="24" font-weight="800">10,842</text>
  </g>
  <g class="float-b" transform="translate(1015 145)">
    <rect width="122" height="76" rx="18" fill="#1a1636" stroke="#8b5cf6" stroke-opacity="0.7"/>
    <text x="17" y="28" fill="#aaa2d2" font-family="Segoe UI, Arial" font-size="12" font-weight="700">WATER</text>
    <text x="17" y="58" fill="#b6a7ff" font-family="Segoe UI, Arial" font-size="24" font-weight="800">2.4 L</text>
  </g>
  <g class="float-a" transform="translate(845 208)">
    <rect width="136" height="72" rx="18" fill="#12263a" stroke="#22d3ee" stroke-opacity="0.6"/>
    <text x="18" y="27" fill="#8ea8bb" font-family="Segoe UI, Arial" font-size="12" font-weight="700">STREAK</text>
    <text x="18" y="55" fill="#6ee7f7" font-family="Segoe UI, Arial" font-size="22" font-weight="800">14 days</text>
  </g>

  <rect x="1" y="1" width="1198" height="318" rx="29" fill="none" stroke="#7dd3fc" stroke-opacity="0.2"/>
</svg>
