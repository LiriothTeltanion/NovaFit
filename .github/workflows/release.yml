name: NovaFit Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: novafit-release-${{ github.ref }}
  cancel-in-progress: false

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  source-artifacts:
    name: Verify Python and source artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          case "${tag}" in v*) ;; *) echo "Tag must start with v" >&2; exit 1 ;; esac
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-build.txt

      - name: Install application and release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-dev.txt -r requirements-build.txt
          python -m pip install -e .
          python -m pip check

      - name: Match tag to package version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: python -c "import os, novafit; assert novafit.__version__ == os.environ['RELEASE_VERSION'], (novafit.__version__, os.environ['RELEASE_VERSION'])"

      - name: Run complete quality gate
        run: python scripts/verify.py --quality

      - name: Build Python and source archive
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python -m build
          git archive --format=zip --prefix="NovaFit-Ultimate-v${RELEASE_VERSION}/" --output="dist/NovaFit-Ultimate-v${RELEASE_VERSION}-Windows.zip" HEAD

      - name: Audit the exact source archive
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python -c "from pathlib import Path; import os, zipfile; archive=Path('dist') / f\"NovaFit-Ultimate-v{os.environ['RELEASE_VERSION']}-Windows.zip\"; zipfile.ZipFile(archive).extractall('release-audit')"
          python tools/package_audit.py --root "release-audit/NovaFit-Ultimate-v${RELEASE_VERSION}" --strict-distribution

      - name: Upload verified Python and source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: novafit-source-${{ steps.release.outputs.version }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/NovaFit-Ultimate-v${{ steps.release.outputs.version }}-Windows.zip
          if-no-files-found: error
          retention-days: 7

  windows-standalone:
    name: Build and audit Windows standalone
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag.StartsWith('v')) { throw 'Tag must start with v' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$($tag.Substring(1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-build.txt

      - name: Install application and standalone tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-dev.txt -r requirements-build.txt
          python -m pip install -e .
          python -m pip check

      - name: Match tag to package version
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: python -c "import os, novafit; assert novafit.__version__ == os.environ['RELEASE_VERSION'], (novafit.__version__, os.environ['RELEASE_VERSION'])"

      - name: Run complete Windows quality gate
        run: python scripts/verify.py --quality

      - name: Build, smoke-test, audit, and hash standalone bundle
        run: python scripts/build_windows_distribution.py

      - name: Re-audit exact staged standalone folder
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: python tools/standalone_audit.py --root "dist/NovaFit-v$env:RELEASE_VERSION-Windows-x64-Standalone" --version "$env:RELEASE_VERSION"

      - name: Upload verified Windows standalone
        uses: actions/upload-artifact@v7
        with:
          name: novafit-windows-standalone-${{ steps.release.outputs.version }}
          path: |
            dist/NovaFit-v*-Windows-x64-Standalone.zip
            dist/NovaFit-v*-Windows-x64-Standalone.zip.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified GitHub Release
    needs: [source-artifacts, windows-standalone]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          case "${tag}" in v*) ;; *) echo "Tag must start with v" >&2; exit 1 ;; esac
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release metadata
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Download every verified artifact
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Verify standalone sidecar and create consolidated checksums
        run: |
          cd release-dist
          sha256sum -c NovaFit-v*-Windows-x64-Standalone.zip.sha256
          test -n "$(find . -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find . -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$(find . -maxdepth 1 -name 'NovaFit-Ultimate-*-Windows.zip' -print -quit)"
          test -n "$(find . -maxdepth 1 -name 'NovaFit-v*-Windows-x64-Standalone.zip' -print -quit)"
          find . -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS.txt' -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; refusing to mutate immutable release assets." >&2
            exit 1
          fi
          gh release create "${RELEASE_TAG}" release-dist/* --verify-tag --generate-notes --title "NovaFit ${RELEASE_TAG}"
