name: NovaFit Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to package
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: novafit-release-${{ github.ref }}
  cancel-in-progress: false

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  release:
    name: Verify and publish safe artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "${tag}" in v*) ;; *) echo "Tag must start with v" >&2; exit 1 ;; esac
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install application and release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-dev.txt
          python -m pip install build
          python -m pip install -e .
          python -m pip check

      - name: Match tag to package version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: python -c "import os, novafit; assert novafit.__version__ == os.environ['RELEASE_VERSION'], (novafit.__version__, os.environ['RELEASE_VERSION'])"

      - name: Run complete quality gate
        run: python scripts/verify.py --quality

      - name: Build Python and Windows-ready archives
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python -m build
          git archive --format=zip --prefix="NovaFit-Ultimate-v${RELEASE_VERSION}/" --output="dist/NovaFit-Ultimate-v${RELEASE_VERSION}-Windows.zip" HEAD

      - name: Audit the exact Windows archive
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python -c "from pathlib import Path; import os, zipfile; archive=Path('dist') / f\"NovaFit-Ultimate-v{os.environ['RELEASE_VERSION']}-Windows.zip\"; zipfile.ZipFile(archive).extractall('release-audit')"
          python tools/package_audit.py --root "release-audit/NovaFit-Ultimate-v${RELEASE_VERSION}" --strict-distribution

      - name: Create SHA-256 checksums
        run: cd dist && sha256sum *.whl *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish or refresh GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* --verify-tag --generate-notes --title "NovaFit ${RELEASE_TAG}"
          fi
