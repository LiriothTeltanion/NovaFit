name: NovaFit Pages

on:
  workflow_run:
    workflows: [NovaFit Quality]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: novafit-pages
  cancel-in-progress: true

jobs:
  build:
    name: Validate exact public artifact
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout the verified commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Stage source and shared public media
        run: python scripts/stage_pages.py --output _site

      - name: Audit exact Pages artifact
        run: python tools/site_audit.py --site-root _site --base-path /NovaFit/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload audited Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy verified showcase
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
