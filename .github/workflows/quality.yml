name: NovaFit Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: novafit-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  verify:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt
          python -m pip install -e .
          python -m pip check

      - name: Compile, test, and smoke-check exports
        run: python scripts/verify.py

      - name: Publish diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: novafit-logs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: data/*.log
          if-no-files-found: ignore

  static-quality:
    name: Ruff · Pyright · package safety
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install application and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-dev.txt
          python -m pip install -e .
          python -m pip check

      - name: Compile, audit, lint, and type-check
        run: python scripts/verify.py --quality --skip-tests --skip-smoke

      - name: Verify clean patch formatting
        run: git diff --check
